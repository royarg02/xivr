name: Run tests

on:
  push:
    branches:
      - master
    paths:
      - '**/*.dart'
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches:
      - master
    paths:
      - '**/*.dart'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Setup Dart
      uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
    - name: Get app dependencies
      run: dart pub get
    - name: Analyze
      run: dart analyze
    - name: Test app
      run: dart test -r expanded
